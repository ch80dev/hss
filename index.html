<body>
	<div id='top'>
		<div id="time"></div>
		<div id="money"></div>
		<div id="status_bars">
			<div id="status_bar_buffer">&nbsp;</div>
			<div id="health_container" class="status_bar_container">
				<div id="health_bar" class="status_bar"></div>
				<div class='status_caption'>Health: <span id="health"></span></div>
			</div><div id="stamina_container" class="status_bar_container">
				<div id="stamina_bar" class="status_bar"></div>
				<div class='status_caption'>Stamina: <span id="stamina"></span></div>
			</div><div id="stigma_container" class="status_bar_container">
				<div id="stigma_bar" class="status_bar"></div>
				<div class='status_caption'>Stigma: <span id="stigma"></span></div>
			</div>
		</div><div id="sickness_container" class="hidden">
				<div id='sickness_caption'>Sickness: <span id="sickness"></span>%</div>
				<span id="is_sick" class="hidden">SICK (<span id='sickness_penalty'></span>)</span>
			
		</div>
	</div>
	<div id="map" class="screen hidden">
		<div id='location_name'></div>
		<div id='map_container'><div id="map_grid"></div></div>
		<div id="mobile_menu">
			<div><button id='mobile_dir-up' class="mobile_dir">&uarr;</button></div>
			<div id="mobile_left_and_right">
				<button id='mobile_dir-left' class="mobile_dir">&larr;</button>
				<button id='mobile_dir-right' class="mobile_dir">&rarr;</button>
			</div>
			<div><button id='mobile_dir-down' class="mobile_dir">&darr;</button></div>
			<div><button id="combat_toggle"></button></div>
		</div>

	</div><div id="loot" class="screen hidden">
		<div id="loot_panels">
			<div id="loot_container">&nbsp;</div>
			<div id="loot_inventory" class="inventory">&nbsp;</div>
		</div>
		<div id="close_loot_div"><button id="close-loot" class="close">close</button></div>
	</div><div id="social" class="screen">
		<div id="social_context"></div>
		<div id="social_menu"></div>
		<div><button id='close-social' class="close">close</button></div>
	</div><div id="shop" class="screen">		
	</div><div id="favorites" class="screen">
	</div><div id="detained" class="screen">
	</div>

	<div id="bottom">
		<div id="equipped"></div>
		<div id="status"></div>
	</div>
